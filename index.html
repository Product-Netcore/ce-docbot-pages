{

</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CE Docbot · Daily Dispatch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --ink:#13151a;
  --ink2:#1b1e26;
  --ink3:#21242d;
  --paper:#f7f4ee;
  --paper2:#ffffff;
  --paperline:#e7e1d3;
  --dim:#878c98;
  --dimtext:#8a8674;
  --text:#1b1e25;
  --signal:#e3a23c;
  --internal:#3fae9c;
  --external:#e07856;
  --design:#9182e6;
  --good:#4caf82;
  --bad:#e2654f;
  --line:#2a2d36;
  --content:#5a92d6;
  --product:#3fae9c;
  --security:#e2654f;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{transition:background .25s ease;}
body{
  background:var(--paper);
  color:var(--text);
  font-family:'Inter',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace;}
h1,h2,h3{font-family:'Fraunces',serif; margin:0; font-weight:600;}
a{color:inherit;}

/* ===== DARK MODE OVERRIDES (sidebar stays dark always; this re-themes the main column) ===== */
html[data-theme="dark"]{
  --paper:#15171c;
  --paper2:#1c1f26;
  --paperline:#2a2d36;
  --text:#eceef0;
  --dimtext:#9499a3;
}
html[data-theme="dark"] .hero .headline-take,
html[data-theme="dark"] .fieldnote .why,
html[data-theme="dark"] .div-center,
html[data-theme="dark"] .deflect-item,
html[data-theme="dark"] .deflect-empty,
html[data-theme="dark"] .deflect-pattern,
html[data-theme="dark"] .topask-q{color:#c7cad1;}
html[data-theme="dark"] .footnote-mark,
html[data-theme="dark"] .deflect-caveat,
html[data-theme="dark"] .tag,
html[data-theme="dark"] .footer-note{color:#6b6f78;}
html[data-theme="dark"] .dash{color:#454952;}
html[data-theme="dark"] .topask-card,
html[data-theme="dark"] .recurring-chip{background:#1c1f26;}

/* ===== TOPBAR ===== */
.topbar{
  position:sticky; top:0; z-index:60; height:50px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; background:var(--ink); border-bottom:1px solid var(--line);
}
.topbar-brand{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim);}
.theme-toggle{display:flex; align-items:center; gap:2px; background:var(--ink2); border:1px solid var(--line); border-radius:20px; padding:3px;}
.theme-toggle button{
  appearance:none; border:none; background:transparent; color:var(--dim);
  font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:5px 12px; border-radius:16px; cursor:pointer;
  display:flex; align-items:center; gap:5px;
}
.theme-toggle button svg{width:12px; height:12px; flex-shrink:0;}
.theme-toggle button.active{background:var(--ink3); color:#fff;}
.theme-toggle button:hover:not(.active){color:#cfd2d9;}

.shell{display:flex; min-height:calc(100vh - 50px);}

/* ===== SIDEBAR ===== */
.sidebar{
  width:300px; min-width:300px;
  background:var(--ink);
  color:#e9e9ec;
  padding:28px 22px 40px;
  position:sticky; top:50px; height:calc(100vh - 50px); overflow-y:auto;
  border-right:1px solid var(--line);
}
.side-brand{margin-bottom:22px;}
.side-brand .wordmark{font-family:'Fraunces',serif; font-style:italic; font-size:22px; font-weight:600; color:#fff;}
.side-brand .sub{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin-top:4px;}

.side-tabs{display:flex; flex-direction:column; gap:6px; margin-bottom:24px; background:var(--ink2); border-radius:10px; padding:5px;}
.tab-btn{
  appearance:none; border:none; border-left:2px solid transparent; background:transparent; color:var(--dim);
  font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.04em;
  text-align:left; padding:9px 12px; border-radius:7px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  transition:background .15s ease, color .15s ease;
}
.tab-btn .num{opacity:.6; margin-right:6px;}
.tab-btn.active{background:rgba(227,162,60,.14); color:var(--signal); font-weight:600; border-left-color:var(--signal);}
.tab-btn.active .num{opacity:1;}
.tab-btn:hover:not(.active){color:#cfd2d9;}

.side-block{margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--line);}
.side-block:last-child{border-bottom:none;}
.side-label{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin-bottom:10px;}
.side-block select{
  width:100%; background:var(--ink2); color:#fff; border:1px solid var(--line);
  border-radius:8px; padding:8px 10px; font-family:'Inter',sans-serif; font-size:13px; cursor:pointer;
}
.side-static{font-size:13px; color:#cfd2d9; font-family:'JetBrains Mono',monospace;}

.dial-wrap{display:flex; align-items:center; gap:14px;}
.dial-pct{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; fill:#fff;}
.dial-cap{font-size:11px; color:var(--dim); margin-top:2px;}

.split-bar-track{display:flex; height:10px; border-radius:6px; overflow:hidden; background:var(--ink2); margin-bottom:8px;}
.split-seg.internal{background:var(--internal);}
.split-seg.external{background:var(--external);}
.split-legend{display:flex; justify-content:space-between; font-size:11px; font-family:'JetBrains Mono',monospace;}
.split-legend .in{color:var(--internal);}
.split-legend .ex{color:var(--external);}

.side-nav{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:3px;}
.side-nav li a{
  display:flex; align-items:center; padding:8px 10px; border-radius:7px; font-size:13px;
  color:#cfd2d9; text-decoration:none; background:rgba(255,255,255,.03);
  border-left:2px solid transparent; cursor:pointer;
  transition:background .15s ease, color .15s ease, border-color .15s ease, transform .12s ease;
}
.side-nav li a:hover{background:var(--ink2); color:#fff; border-left-color:var(--signal); transform:translateX(1px);}
.side-nav li a:active{background:rgba(227,162,60,.16);}
.side-nav li .nnum{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--signal); margin-right:7px; font-weight:700;}

/* ===== MAIN ===== */
.main{flex:1; min-width:0; padding:36px 48px 80px; max-width:980px;}
@media (max-width:760px){ .shell{flex-direction:column;} .sidebar{width:100%; height:auto; position:relative;} .main{padding:24px 20px 60px;} }

.hero{margin-bottom:8px;}
.hero .dateline{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dimtext); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;}
.hero h1{font-size:34px; font-style:italic; line-height:1.15; margin-bottom:14px;}
.hero .headline-take{font-size:16.5px; line-height:1.55; color:#373a40; max-width:760px;}

.stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:26px 0 14px;}
.stat{background:var(--paper2); border:1px solid var(--paperline); border-radius:12px; padding:16px 14px; transition:box-shadow .15s ease;}
.stat .v{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700;}
.stat .l{font-size:11.5px; color:var(--dimtext); margin-top:4px;}
.stats.cols-5{grid-template-columns:repeat(5,1fr);}
@media (max-width:900px){ .stats.cols-5{grid-template-columns:repeat(3,1fr);} }
@media (max-width:640px){ .stats{grid-template-columns:repeat(2,1fr);} .stats.cols-5{grid-template-columns:repeat(2,1fr);} }

.qtype-row{display:flex; gap:10px; align-items:center; margin-bottom:10px; font-size:13px; color:var(--dimtext); flex-wrap:wrap;}
.qtype-pill{font-family:'JetBrains Mono',monospace; font-size:12px; padding:4px 10px; border-radius:20px; border:1px solid var(--paperline); cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;}
.qtype-pill.tech{color:var(--internal); border-color:var(--internal);}
.qtype-pill.gen{color:var(--external); border-color:var(--external);}
.qtype-pill:hover{transform:translateY(-1px); box-shadow:0 3px 8px rgba(0,0,0,.08);}
.qtype-pill.active.tech{background:var(--internal); color:#fff;}
.qtype-pill.active.gen{background:var(--external); color:#fff;}
.qtype-hint{font-size:11px; color:var(--dimtext); font-style:italic;}
.qtype-panel{display:none; margin:2px 0 18px; padding:14px 16px; background:var(--paper2); border:1px solid var(--paperline); border-radius:10px;}
.qtype-panel.open{display:block; animation:fadeUp .3s ease both;}
.qtype-panel-cols{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
@media (max-width:640px){ .qtype-panel-cols{grid-template-columns:1fr;} }
.qtype-panel-tag{font-size:11.5px; color:#a4a097; margin-bottom:10px; font-style:italic;}
.qtype-panel-sub{font-family:'JetBrains Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;}
.qtype-panel-sub.tech{color:var(--internal);}
.qtype-panel-sub.gen{color:var(--external);}
.stat.clickable{cursor:pointer; transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;}
.stat.clickable:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.08); border-color:var(--signal);}
.footnote-mark{font-size:11.5px; color:#a4a097; margin-bottom:30px;}

/* accordions */
details.acc{
  background:var(--paper2); border:1px solid var(--paperline); border-radius:14px;
  margin-bottom:14px; overflow:hidden;
}
details.acc > summary{
  list-style:none; cursor:pointer; padding:18px 20px;
  display:flex; align-items:center; justify-content:space-between;
  font-family:'Fraunces',serif; font-size:18px; font-weight:600;
}
details.acc > summary::-webkit-details-marker{display:none;}
details.acc > summary .snum{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--signal); margin-right:10px; font-weight:500;}
details.acc > summary .vm{
  font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--dimtext);
  display:flex; align-items:center; gap:5px; text-transform:uppercase; letter-spacing:.04em;
  border:1px solid var(--paperline); border-radius:20px; padding:5px 12px; flex-shrink:0;
  transition:border-color .15s ease, color .15s ease;
}
details.acc:hover > summary .vm{border-color:var(--signal); color:var(--signal);}
details.acc:not([open]) .vm-less{display:none;}
details.acc[open] .vm-more{display:none;}
details.acc[open]{border-color:var(--signal);}
details.acc[open] > summary{border-bottom:1px solid var(--paperline);}
details.acc .acc-body{padding:0 20px 22px;}
details.acc .acc-sub{font-size:14.5px; line-height:1.5; color:var(--dimtext); margin:-6px 0 16px;}

/* deflection */
.deflect-na{font-size:13.5px; color:var(--dimtext); font-style:italic;}
.deflect-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
.deflect-stat{border-radius:12px; padding:14px; text-align:center;}
.deflect-stat.good{background:rgba(63,174,156,.1); border:1px solid rgba(63,174,156,.3);}
.deflect-stat.bad{background:rgba(224,120,86,.1); border:1px solid rgba(224,120,86,.3);}
.deflect-stat .v{font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700;}
.deflect-stat.good .v{color:var(--internal);}
.deflect-stat.bad .v{color:var(--external);}
.deflect-stat .l{font-size:11.5px; color:var(--dimtext); margin-top:4px;}
.deflect-subtag{font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--dimtext); margin:14px 0 8px;}
.deflect-item, .deflect-empty, .deflect-pattern{font-size:13.5px; line-height:1.5; margin-bottom:8px; color:#373a40;}
.deflect-item .who, .deflect-pattern .area{font-weight:600;}
.deflect-item .tix{font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--external);}
.deflect-caveat{font-size:12px; color:#a4a097; margin-top:14px; padding-top:12px; border-top:1px dashed var(--paperline);}

/* insights */
.insight-row{display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--paperline);}
.insight-row:last-child{border-bottom:none;}
.owner-chip{font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:4px 9px; border-radius:6px; white-space:nowrap; height:fit-content; text-transform:uppercase;}
.owner-chip.content{background:rgba(90,146,214,.12); color:var(--content);}
.owner-chip.product{background:rgba(63,174,156,.12); color:var(--product);}
.owner-chip.design{background:rgba(145,130,230,.12); color:var(--design);}
.owner-chip.calibration{background:rgba(227,162,60,.15); color:var(--signal);}
.owner-chip.security{background:rgba(226,101,79,.12); color:var(--security);}
.ititle{font-weight:600; font-size:14.5px; margin-bottom:4px;}
.idesc{font-size:14px; color:var(--dimtext); line-height:1.5;}

/* fieldnote */
.fieldnote .quote{font-family:'Fraunces',serif; font-style:italic; font-size:18px; line-height:1.4; margin-bottom:12px;}
.fieldnote .who{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dimtext); margin-bottom:8px;}
.fieldnote .why{font-size:13.5px; color:#373a40; line-height:1.5;}

/* signal bars */
.legend{display:flex; gap:18px; font-size:12px; color:var(--dimtext); margin-bottom:14px;}
.legend .swatch{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px;}
.div-row{display:grid; grid-template-columns:1fr 200px 1fr; align-items:center; gap:8px; margin-bottom:10px;}
.div-left, .div-right{display:flex; align-items:center; gap:6px;}
.div-left{justify-content:flex-end;}
.div-left .bar, .div-right .bar{height:9px; border-radius:5px; min-width:2px;}
.div-center{text-align:center; font-size:12.5px; color:#373a40;}
.div-left .val, .div-right .val{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--dimtext); min-width:14px;}

/* top askers */
.topask-card{background:var(--paper); border:1px solid var(--paperline); border-radius:10px; padding:14px 16px; margin-bottom:10px;}
.topask-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.rank{font-family:'JetBrains Mono',monospace; font-size:11px; background:var(--ink); color:#fff; padding:2px 7px; border-radius:5px; margin-right:8px;}
.topask-email{font-weight:600; font-size:13.5px;}
.qcount{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dimtext);}
.topask-q{font-size:13px; color:#373a40; margin-bottom:4px;}
.topask-q .t{display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--internal); background:rgba(63,174,156,.1); padding:2px 6px; border-radius:5px; margin-right:7px;}
.panel-tag{display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--signal); background:rgba(227,162,60,.12); padding:1px 6px; border-radius:5px; margin-left:6px; vertical-align:middle;}
.friction{font-size:12px; color:var(--bad); margin-top:6px;}
.topask-empty{background:var(--paper); border:1px dashed var(--paperline); border-radius:10px; padding:24px 18px; text-align:center;}
.topask-empty .big{display:block; font-family:'Fraunces',serif; font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px;}
.topask-empty .small{font-size:13px; color:var(--dimtext); line-height:1.5;}
html[data-theme="dark"] .topask-empty .small{color:#9499a3;}

/* beat report table */
.tablewrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:13px;}
table th{text-align:left; font-family:'JetBrains Mono',monospace; font-size:10.5px; text-transform:uppercase; color:var(--dimtext); padding:8px; border-bottom:1px solid var(--paperline);}
table td{padding:10px 8px; border-bottom:1px solid var(--paperline); vertical-align:top;}
.greeting-row{opacity:.55;}
.countpill{font-family:'JetBrains Mono',monospace; font-size:12px; padding:2px 8px; border-radius:6px;}
.countpill.in{background:rgba(63,174,156,.12); color:var(--internal);}
.countpill.ex{background:rgba(224,120,86,.12); color:var(--external);}
.dash{color:#c7c2b3;}
.email-in{color:var(--internal); font-family:'JetBrains Mono',monospace; font-size:11.5px;}
.email-ex{color:var(--external); font-family:'JetBrains Mono',monospace; font-size:11.5px;}
.qtext{color:var(--dimtext); font-size:12px;}
.emaillist{margin-top:6px;}

/* disclosure */
.disclosure ul{margin:0; padding-left:18px;}
.disclosure li{font-size:13px; color:var(--dimtext); margin-bottom:8px; line-height:1.5;}

/* master / historical */
.master-cols{display:grid; grid-template-columns:1fr 1fr; gap:30px;}
@media (max-width:760px){ .master-cols{grid-template-columns:1fr;} }
.master-subtag{font-family:'JetBrains Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--dimtext); margin-bottom:12px;}
.power-row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--paperline); transition:background .15s ease;}
.power-row:hover{background:var(--paper);}
.power-rank{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--signal);}
.power-id{flex:1;}
.power-email{font-size:13px; font-weight:600;}
.power-sub{font-size:11.5px; color:var(--dimtext); display:flex; gap:8px; margin-top:2px;}
.recurring-badge{background:rgba(227,162,60,.15); color:var(--signal); padding:1px 7px; border-radius:5px;}
.power-count{text-align:right;}
.power-count .v{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px;}
.power-count .l{font-size:10px; color:var(--dimtext);}
.master-note{margin-top:24px; padding-top:18px; border-top:1px solid var(--paperline);}
.master-note-label{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--signal); display:block; margin-bottom:10px;}
.recurring-chips{display:flex; flex-wrap:wrap; gap:8px;}
.recurring-chip{font-family:'JetBrains Mono',monospace; font-size:11.5px; background:var(--paper); border:1px solid var(--paperline); padding:5px 10px; border-radius:7px;}

/* busiest sections — pattern callouts (lightweight, no boxes) */
.area-block{padding:14px 0; border-bottom:1px solid var(--paperline);}
.area-block:last-child{border-bottom:none;}
.area-pattern{font-size:12px; line-height:1.5; color:var(--dimtext); margin:6px 0 0; padding-left:1px;}
.area-pattern::before{content:'— '; opacity:.6;}
.area-pattern .ex{font-style:italic; opacity:.85;}
.area-pattern.internal{color:var(--internal);}
.area-pattern.external{color:var(--external);}
.area-pattern.balanced{color:var(--signal);}

/* key takeaways */
.takeaway-card{
  display:flex; gap:16px; padding:18px 18px; margin-bottom:12px;
  background:var(--paper2); border:1px solid var(--paperline); border-left:3px solid var(--signal);
  border-radius:12px; transition:box-shadow .15s ease;
}
.takeaway-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.06);}
.takeaway-card:last-child{margin-bottom:0;}
.takeaway-num{
  font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; flex-shrink:0;
  width:28px; height:28px; border-radius:50%; background:var(--ink); color:#fff;
  display:flex; align-items:center; justify-content:center;
}
.takeaway-body{flex:1; min-width:0;}
.takeaway-body .ttitle{font-weight:600; font-size:16px; margin-bottom:10px; font-family:'Fraunces',serif; line-height:1.3;}
.takeaway-bullets{list-style:none; margin:0; padding:0;}
.takeaway-bullets li{font-size:13px; line-height:1.5; color:var(--dimtext); margin-bottom:6px; padding-left:14px; position:relative;}
.takeaway-bullets li:last-child{margin-bottom:0;}
.takeaway-bullets li::before{content:'→'; position:absolute; left:0; color:var(--signal); font-weight:700;}
.takeaway-bullets li.reco{color:var(--text); font-weight:500;}
.takeaway-bullets li .mono{color:var(--text); font-weight:600;}

/* busiest sections — leadership view (top 3 cards + condensed "also active" list) */
.lead-areas{display:flex; flex-direction:column; gap:12px; margin-top:4px;}
.lead-area-card{
  display:flex; gap:16px; padding:18px 18px;
  background:var(--paper2); border:1px solid var(--paperline); border-left:3px solid var(--signal);
  border-radius:12px; transition:box-shadow .15s ease;
}
.lead-area-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.06);}
.lead-area-card.internal{border-left-color:var(--internal);}
.lead-area-card.external{border-left-color:var(--external);}
.lead-area-card.balanced{border-left-color:var(--signal);}
.lead-area-rank{
  font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; flex-shrink:0;
  width:28px; height:28px; border-radius:50%; background:var(--ink); color:#fff;
  display:flex; align-items:center; justify-content:center;
}
.lead-area-body{flex:1; min-width:0;}
.lead-area-top{display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.lead-area-name{font-family:'Fraunces',serif; font-weight:600; font-size:17px;}
.lead-area-pct{font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--dimtext); white-space:nowrap;}
.lead-area-total{font-size:12px; color:var(--dimtext); margin:3px 0 10px;}
.lead-area-body .split-bar-track{margin-bottom:6px;}
.lead-area-insight{font-size:13.5px; line-height:1.5; color:var(--text); margin-top:8px; padding-left:14px; position:relative;}
.lead-area-insight::before{content:'→'; position:absolute; left:0; color:var(--signal); font-weight:700;}
.lead-area-insight .mono{font-weight:700;}

.other-areas{margin-top:18px; padding-top:16px; border-top:1px solid var(--paperline);}
.other-areas-label{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--signal); display:block; margin-bottom:10px;}
.other-areas-list{display:flex; flex-wrap:wrap; gap:8px;}
.other-area-chip{font-family:'JetBrains Mono',monospace; font-size:11.5px; background:var(--paper); border:1px solid var(--paperline); padding:5px 10px; border-radius:7px; color:var(--text);}
.other-area-chip .mono{font-weight:700;}
.other-area-chip .dim{color:var(--dimtext); font-weight:400;}

/* click-through affordances */
.lead-area-card{cursor:pointer;}
.other-area-chip{cursor:pointer; transition:background .15s ease;}
.other-area-chip:hover{background:var(--paperline);}
.power-row{cursor:pointer;}
.power-cta{color:var(--dimtext); font-size:15px; flex-shrink:0; transition:transform .15s ease, color .15s ease;}
.power-row:hover .power-cta{color:var(--signal); transform:translateX(2px);}
.cta-hint{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--signal); margin-top:10px; display:inline-flex; align-items:center; gap:4px;}
.cta-hint::after{content:'→'; transition:transform .15s ease;}
.lead-area-card:hover .cta-hint::after{transform:translateX(3px);}

/* area trend chip — first half vs second half of the tracked window */
.lead-area-trend{font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:2px 8px; border-radius:6px; margin-left:8px; white-space:nowrap;}
.lead-area-trend.up{background:rgba(226,101,79,.15); color:var(--bad);}
.lead-area-trend.down{background:rgba(76,175,130,.15); color:var(--good);}

/* drilldown modal — shared by area + power-user click-through */
.modal-overlay{display:none; position:fixed; inset:0; background:rgba(10,10,12,.55); z-index:50; align-items:center; justify-content:center; padding:24px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--paper2); border:1px solid var(--paperline); border-radius:14px; max-width:680px; width:100%; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.3); position:relative;}
.modal-close{position:absolute; top:14px; right:14px; background:none; border:none; font-size:24px; line-height:1; color:var(--dimtext); cursor:pointer; padding:2px 9px; border-radius:6px;}
.modal-close:hover{background:var(--paper); color:var(--text);}
.modal-head{padding:22px 26px 14px; border-bottom:1px solid var(--paperline);}
.modal-title{font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin-bottom:6px; padding-right:32px; word-break:break-word;}
.modal-meta{font-size:12px; color:var(--dimtext); line-height:1.5;}
.modal-meta .mono{color:var(--text); font-weight:700;}
.modal-body{padding:6px 26px 22px; overflow-y:auto; flex:1;}
.modal-q{padding:12px 0; border-bottom:1px solid var(--paperline);}
.modal-q:last-child{border-bottom:none;}
.modal-q-meta{display:flex; gap:6px; align-items:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dimtext); margin-bottom:5px; flex-wrap:wrap;}
.modal-q-meta .mono{color:var(--dimtext);}
.modal-q-badge{padding:1px 7px; border-radius:5px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; font-size:9.5px;}
.modal-q-badge.internal{background:rgba(63,174,156,.15); color:var(--internal);}
.modal-q-badge.external{background:rgba(224,120,86,.15); color:var(--external);}
.modal-q-badge.technical{background:rgba(90,146,214,.15); color:var(--content);}
.modal-q-badge.generic{background:rgba(227,162,60,.15); color:var(--signal);}
.modal-q-badge.spam{background:rgba(226,101,79,.15); color:var(--bad);}
.modal-q-first{background:rgba(227,162,60,.2); color:var(--signal); padding:1px 7px; border-radius:5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; font-size:9.5px;}
.modal-q-text{font-size:13.5px; line-height:1.5; color:var(--text);}
.modal-empty{padding:30px 0; text-align:center; color:var(--dimtext); font-size:13px;}

.tag{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#a4a097; margin:0 0 6px;}
.footer-note{font-size:11.5px; color:#a4a097; text-align:center; margin-top:40px; font-family:'JetBrains Mono',monospace;}
.empty{padding:60px 0; text-align:center; color:var(--dimtext);}

.anim{animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* since-last-report delta strip */
.since-strip{
  display:flex; flex-wrap:wrap; gap:8px 20px; align-items:center;
  margin:16px 0 4px; padding:12px 16px; background:var(--paper2); border:1px solid var(--paperline);
  border-radius:10px; font-size:12.5px; color:var(--dimtext);
}
.since-strip .since-label{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--signal); margin-right:4px; flex-basis:100%;}
.since-strip .since-item{display:inline-flex; align-items:center; gap:5px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px;}
.since-strip .since-item .arrow-up, .since-strip .since-item .arrow-down{font-weight:700; color:var(--signal);}
.since-strip .since-item .dim{color:var(--dimtext);}
.since-strip .since-empty{font-style:italic; color:var(--dimtext); font-size:12.5px;}

.badge-new{
  font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
  background:var(--signal); color:#1b1508; padding:2px 6px; border-radius:5px; margin-left:6px; vertical-align:middle;
  display:inline-block;
}

.mini-metric{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--dimtext); margin-top:4px;}
.mini-metric .mono{color:var(--text); font-weight:600;}

.sharp-mover-callout{
  display:flex; gap:12px; align-items:flex-start; padding:14px 16px; margin:12px 0 16px;
  background:rgba(227,162,60,.08); border:1px solid rgba(227,162,60,.3); border-radius:10px;
}
.sharp-mover-callout .icon{font-size:17px; line-height:1.3;}
.sharp-mover-callout .body{font-size:13.5px; color:var(--text); line-height:1.5;}
.sharp-mover-callout .body .mono{font-weight:700;}

.trending-week{margin-top:14px; padding-top:12px; border-top:1px dashed var(--paperline);}
.trending-week-label{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--signal); margin-bottom:8px;}
.trending-week-row{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; padding:5px 0; cursor:pointer;}
.trending-week-row:hover{color:var(--signal);}
.trending-week-row .email{font-family:'JetBrains Mono',monospace; font-size:11.5px;}
.trending-week-row .cnt{color:var(--dimtext); font-family:'JetBrains Mono',monospace; font-size:11px;}
.trending-week-row .dim{color:var(--dimtext); font-style:italic; cursor:default;}

function classifyAreaPattern(internal, external){
  const total = internal + external;
  if(total === 0) return {label:'No volume', cls:'balanced'};
  if(internal === 0) return {label:'100% customer-side — no internal visibility into this gap', cls:'external'};
  if(external === 0) return {label:'100% internal-side — purely an internal enablement ask', cls:'internal'};
  const share = internal/total;
  if(share >= 0.65) return {label:'mostly internal — enablement gap candidate', cls:'internal'};
  if(share <= 0.35) return {label:'mostly customer — self-serve/content gap candidate', cls:'external'};
  return {label:'balanced — both sides hit this equally', cls:'balanced'};
}

// Ties each top area's one-line insight to a real, already-computed signal (upload/harvest
// failures, or a same-user Freshdesk escalation) when one exists for that area; falls back to
// the internal/external skew framing otherwise. Deliberately NOT a phrase-bucket heuristic —
// that produced noise ("mostly 'how do I' asks") rather than something a CTO/CEO would act on.
function buildAreaInsight(a, m){
  const upHits = (m.uploadHits||[]).filter(h=>h.area===a.area);
  if(upHits.length){
    const pctOfArea = a.total ? Math.round(upHits.length/a.total*100) : 0;
    return '<span class="mono">'+upHits.length+'</span> of these ('+pctOfArea+'%) are upload/data-ingestion failures — a recurring platform-reliability pattern, not isolated user error.';
  }
  const escForArea = (m.deflEscalations||[]).filter(e=>e.area===a.area);
  if(escForArea.length){
    return `<span class="mono">${escForArea.length}</span> of ${a.total} escalated to a Freshdesk ticket from the same person — the bot's answer alone didn't close the loop.`;
  }
  const label = a.pattern.label;
  return label.charAt(0).toUpperCase()+label.slice(1)+'.';
}

// Splits the tracked window in half (by date, not by count) and compares an area's
// per-day question rate in the second half vs the first — a real "is this getting worse
// or better" signal, not just a static total. Needs >=4 tracked days to be meaningful.
function computeAreaTrend(area, m){
  const dates = m.dates;
  if(dates.length < 4) return null;
  const mid = Math.ceil(dates.length/2);
  const firstHalf = new Set(dates.slice(0, mid));
  const secondHalf = new Set(dates.slice(mid));
  let firstCount = 0, secondCount = 0;
  m.allQuestions.forEach(q=>{
    if(q.area !== area) return;
    if(firstHalf.has(q.date)) firstCount++;
    else if(secondHalf.has(q.date)) secondCount++;
  });
  if(firstCount===0 && secondCount===0) return null;
  const firstRate = firstCount/firstHalf.size;
  const secondRate = secondCount/secondHalf.size;
  if(firstRate===0) return null;
  const pctChange = Math.round((secondRate-firstRate)/firstRate*100);
  return {firstCount, secondCount, pctChange};
}

// Heuristic only — used purely to power the "show me examples" click-through on the
// Technical/Generic stat. Not guaranteed to reconcile 1:1 with the day's reported totals,
// which come from the original per-conversation classification at ingestion time.
function classifyQueryType(text){
  const t = (text||'').toLowerCase();
  const techCues = ['api','integration','webhook','error','fail','bug','not working',"doesn't work",'config','json','csv','script','code','sdk','token','auth','segment','journey','rate limit','sync','timeout','404','500','log','endpoint','payload','schema','sso','smtp','dkim','dns','retry','queue','export','import'];
  return techCues.some(c=>t.indexOf(c)>=0) ? 'technical' : 'generic';
}

// Some inbound traffic to this bot isn't a Netcore CE question at all — stray loan/credit/
// lottery/job-spam style messages that look like they landed here by mistake (shared WhatsApp
// number, wrong contact, generic bot/scraper noise). Left in, they pollute every aggregate
// below with content nobody on the CE team can or should act on. Detected items are NEVER
// silently dropped — they're filtered out of the analysis arrays below AND listed in full,
// with the matched reason, in the "Data hygiene" panel so this stays auditable, not opaque.
const SPAM_SIGNALS = [
  {cat:'Loan / credit request', kws:['loan','cibil','credit card apply','apply for credit card','udhar chahiye','udhar chaiye','paisa chahiye','loan chahiye','loan chaiye','gold loan','personal loan','home loan','car loan',' emi ','emi options for','emi kab','payu finance','pay u finance','bajaj finance','finance se ho','finance karwana']},
  {cat:'Investment / trading spam', kws:['mutual fund','sip investment','demat account','stock tips','crypto invest','bitcoin invest','forex trading','share market tips','intraday tips']},
  {cat:'Lottery / prize scam', kws:['you have won','claim your prize','lottery','jackpot','lucky draw winner','congratulations you']},
  {cat:'Gambling', kws:['casino','betting app','satta ','online betting','rummy app']},
  {cat:'Job / earn-money spam', kws:['work from home job','earn money daily','part time job offer','data entry job','earn from home','job vacancy']},
  {cat:'Government ID / KYC spam', kws:['aadhar card update','pan card update','kyc pending','kyc update required','update your kyc']},
  {cat:'Government subsidy / scheme spam', kws:['subsidy','sarkari yojana','pm yojana','kisan yojana','yojana ka labh','scheme ka paisa']},
  {cat:'Insurance spam', kws:['insurance policy','renew your policy','policy renewal','lic policy']}
];

// Pure greetings with no actual question ("hi", "hello", "hey" and nothing else) carry zero
// product signal — they're session-opener noise, not a CE topic, and inflate area/user counts
// without telling any PM anything actionable. Matched on the FULL trimmed message, never as a
// substring, so a real question that happens to start with "Hi, how do I..." is never caught.
const GREETING_ONLY_RE = /^(hi+|h+ello+|hey+|hii+|helo+|yo|sup|good\s?(morning|afternoon|evening|day)|greetings|namaste|hola)[\s!.,?]*$/i;

function detectSpam(text){
  const raw = (text||'').trim();
  if(GREETING_ONLY_RE.test(raw)) return 'Greeting only — no actual question';
  const t = ' '+raw.toLowerCase()+' ';
  for(const sig of SPAM_SIGNALS){
    for(const kw of sig.kws){
      if(t.indexOf(kw) >= 0) return sig.cat;
    }
  }
  return null;
}

function findPatternRiskByKeyword(archive, keyword){
  const dates = Object.keys(archive).sort();
  for(const d of dates){
    const td = archive[d].ticketDeflection;
    if(td && td.patternRisk){
      const hit = td.patternRisk.find(p => (p.note||'').toLowerCase().indexOf(keyword.toLowerCase()) >= 0);
      if(hit) return Object.assign({date:d}, hit);
    }
  }
  return null;
}

function computeMasterSummary(archive, dateSubset){
  const dates = (dateSubset || Object.keys(archive)).slice().sort();
  const askerInternal = {};
  const askerExternal = {};
  const areaMap = {};
  let totalConv = 0, totalResSum = 0, totalInternal = 0, totalExternal = 0;
  let techTotal = 0, genTotal = 0;
  let basicInternal = 0, basicExternal = 0;
  let uploadHits = [];
  let competitorHits = [];
  let allQuestions = [];
  let suppressed = [];
  let deflDeflected = 0, deflChecked = 0, deflDaysTracked = [], deflEscalations = [];

  const BASIC_THEMES = ['How do I do X', "What does X mean/how it works", 'Where do I set up/find X', "Where's the doc/API for X"];
  const UPLOAD_KW = ['upload','harvest'];
  const COMPETITOR_DOMAINS = ['clevertap.in','clevertap.com'];
  const DELETION_KW = ['delete my email','deleted from your database','delete my data','delete my account','remove my email','remove my data','gdpr','right to be forgotten','delete my personal'];
  let deletionHits = [];
  let weekdayTotal = 0, weekdayDays = 0, weekendTotal = 0, weekendDays = 0;
  let csatArtifactDates = [];

  dates.forEach(d=>{
    const day = archive[d];
    if(!day) return;
    totalConv += day.totalConversations;
    totalResSum += day.resolutionRate;
    totalInternal += day.internalTotal;
    totalExternal += day.externalTotal;
    if(day.queryType){ techTotal += day.queryType.technical||0; genTotal += day.queryType.generic||0; }

    const dow = new Date(d+'T12:00:00Z').getUTCDay();
    if(dow===0 || dow===6){ weekendTotal += day.totalConversations; weekendDays++; }
    else { weekdayTotal += day.totalConversations; weekdayDays++; }

    if(JSON.stringify(day).toLowerCase().indexOf('csat') >= 0) csatArtifactDates.push(d);

    (day.themesBySource||[]).forEach(t=>{
      if(BASIC_THEMES.indexOf(t.theme) >= 0){
        basicInternal += (t.internal||0);
        basicExternal += (t.external||0);
      }
    });

    (day.areas||[]).forEach(a=>{
      const key = a.area.replace(' (greeting only)','');
      if(!areaMap[key]) areaMap[key] = {internal:0, external:0, samples:[]};

      const tally = (x, map)=>{
        if(!map[x.email]) map[x.email] = {count:0, days:new Set(), areas:{}};
        map[x.email].count++;
        map[x.email].days.add(d);
        map[x.email].areas[key] = (map[x.email].areas[key]||0)+1;
      };
      // Area/power-user/drilldown aggregates are built ONLY from non-spam questions —
      // each item is checked against detectSpam() before it's allowed to count toward
      // anything. Matches are routed to `suppressed` instead, never silently discarded.
      (a.internalQ||[]).forEach(x=>{
        const spamCat = detectSpam(x.q);
        if(spamCat){ suppressed.push({date:d, area:key, side:'internal', email:x.email, q:x.q, reason:spamCat}); return; }
        tally(x, askerInternal);
        areaMap[key].internal++;
        areaMap[key].samples.push({q:x.q});
        allQuestions.push({date:d, area:key, side:'internal', email:x.email, q:x.q, panel:x.panel});
        const text = (x.q||'').toLowerCase();
        if(UPLOAD_KW.some(k=>text.indexOf(k)>=0)) uploadHits.push({date:d, area:key, side:'internal', email:x.email, q:x.q});
        if(DELETION_KW.some(k=>text.indexOf(k)>=0)) deletionHits.push({date:d, area:key, side:'internal', email:x.email, q:x.q});
      });
      (a.externalQ||[]).forEach(x=>{
        const spamCat = detectSpam(x.q);
        if(spamCat){ suppressed.push({date:d, area:key, side:'external', email:x.email, q:x.q, reason:spamCat}); return; }
        tally(x, askerExternal);
        areaMap[key].external++;
        areaMap[key].samples.push({q:x.q});
        allQuestions.push({date:d, area:key, side:'external', email:x.email, q:x.q, panel:x.panel});
        const text = (x.q||'').toLowerCase();
        if(UPLOAD_KW.some(k=>text.indexOf(k)>=0)) uploadHits.push({date:d, area:key, side:'external', email:x.email, q:x.q});
        if(DELETION_KW.some(k=>text.indexOf(k)>=0)) deletionHits.push({date:d, area:key, side:'external', email:x.email, q:x.q});
      });
    });

    (day.topAskers||[]).forEach(u=>{
      if(COMPETITOR_DOMAINS.some(dom => u.email.indexOf('@'+dom) >= 0)){
        competitorHits.push(Object.assign({date:d}, u));
      }
    });

    const td = day.ticketDeflection;
    if(td){
      deflDaysTracked.push(d);
      deflDeflected += td.deflectedCount;
      deflChecked += td.totalConversations;
      (td.sameUserEscalations||[]).forEach(e=>deflEscalations.push(Object.assign({date:d}, e)));
    }
  });

  const buildPowerList = (map, n)=> Object.entries(map)
    .map(([email,v])=>({
      email, count:v.count, dayCount:v.days.size,
      topArea: Object.entries(v.areas).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—'
    }))
    .sort((a,b)=>b.count-a.count || b.dayCount-a.dayCount)
    .slice(0, n||6);

  const powerUsersInternal = buildPowerList(askerInternal, 6);
  const powerUsersExternal = buildPowerList(askerExternal, 6);

  // validTotalConv = raw logged volume minus detected spam/off-topic noise. Used as the
  // denominator for area share so "% of volume" reflects genuine CE questions, not bot/spam
  // traffic that happened to land in the same inbox. The raw totalConv (hero stat) is left
  // untouched since it's sourced straight from each day's own pipeline total rather than
  // recomputed here.
  const validTotalConv = Math.max(totalConv - suppressed.length, 0);

  const topAreas = Object.entries(areaMap)
    .map(([area,v])=>{
      const total = v.internal+v.external;
      const pattern = classifyAreaPattern(v.internal, v.external);
      const pct = validTotalConv ? Math.round(total/validTotalConv*100) : 0;
      return {area, total, internal:v.internal, external:v.external, pattern, pct};
    })
    .filter(a=>a.total>0)
    .sort((a,b)=>b.total-a.total);

  const avgResolution = dates.length ? Math.round(totalResSum/dates.length) : 0;

  const basicTotal = basicInternal + basicExternal;
  const basicPct = totalConv ? Math.round(basicTotal/totalConv*100) : 0;

  const apiArea = topAreas.find(a=>a.area.indexOf('API') >= 0) || null;
  const apiPct = (apiArea && validTotalConv) ? Math.round(apiArea.total/validTotalConv*100) : 0;

  const uploadExternalCount = uploadHits.filter(h=>h.side==='external').length;
  const uploadInternalCount = uploadHits.filter(h=>h.side==='internal').length;
  const uploadByDay = {};
  uploadHits.forEach(h=>{ uploadByDay[h.date] = (uploadByDay[h.date]||0) + 1; });
  const uploadPeak = Object.entries(uploadByDay).sort((a,b)=>b[1]-a[1])[0] || null;
  const uploadDaysCount = Object.keys(uploadByDay).length;

  const deflRate = deflChecked ? Math.round(deflDeflected/deflChecked*100) : null;
  const quangCase = findPatternRiskByKeyword(archive, 'quang ngo');
  const topInternalRepeat = powerUsersInternal[0] || null;

  const weekdayAvg = weekdayDays ? +(weekdayTotal/weekdayDays).toFixed(1) : 0;
  const weekendAvg = weekendDays ? +(weekendTotal/weekendDays).toFixed(1) : 0;

  const result = {
    dates, totalConv, validTotalConv, avgResolution, totalInternal, totalExternal,
    techTotal, genTotal,
    powerUsersInternal, powerUsersExternal,
    topAreas,
    basicInternal, basicExternal, basicTotal, basicPct,
    apiArea, apiPct,
    uploadHits, uploadExternalCount, uploadInternalCount, uploadPeak, uploadDaysCount,
    deflDeflected, deflChecked, deflRate, deflDaysTracked, deflEscalations,
    quangCase, competitorHits, topInternalRepeat, allQuestions,
    deletionHits, weekdayTotal, weekdayDays, weekendTotal, weekendDays, weekdayAvg, weekendAvg,
    csatArtifactDates,
    suppressed, suppressedCount: suppressed.length
  };

  // Sharpest-moving area across the WHOLE tracked area list (not just the top-3 that get
  // shown by default) — first half of the window vs second half. Lets a fast-mover that's
  // currently 4th or 5th by raw volume still surface somewhere on the page instead of
  // being buried in the "Also active" chip row.
  let sharpestMover = null;
  topAreas.forEach(a=>{
    const trend = computeAreaTrend(a.area, result);
    if(trend && (!sharpestMover || Math.abs(trend.pctChange) > Math.abs(sharpestMover.trend.pctChange))){
      sharpestMover = {area: a.area, areaData: a, trend};
    }
  });
  result.sharpestMover = sharpestMover;

  return result;
}

function computeSinceLastReport(archive){
  const datesAll = Object.keys(archive).sort();
  if(datesAll.length < 2) return null;
  const datesPrev = datesAll.slice(0, -1);
  const mFull = computeMasterSummary(archive, datesAll);
  const mPrev = computeMasterSummary(archive, datesPrev);
  const latestDate = datesAll[datesAll.length-1];

  const newEscalations = mFull.deflEscalations.filter(e => e.date === latestDate);

  const prevAreaTotals = {};
  mPrev.topAreas.forEach(a => { prevAreaTotals[a.area] = a.total; });
  const newAreas = mFull.topAreas.filter(a => !prevAreaTotals[a.area]);

  const prevReasons = new Set(mPrev.suppressed.map(s=>s.reason));
  const newSpamCats = Array.from(new Set(mFull.suppressed.filter(s=>!prevReasons.has(s.reason)).map(s=>s.reason)));

  const prevInternalEmails = new Set(mPrev.powerUsersInternal.map(u=>u.email));
  const newInternalPower = mFull.powerUsersInternal.filter(u=>!prevInternalEmails.has(u.email));
  const prevExternalEmails = new Set(mPrev.powerUsersExternal.map(u=>u.email));
  const newExternalPower = mFull.powerUsersExternal.filter(u=>!prevExternalEmails.has(u.email));

  return {
    latestDate,
    deflRateDelta: (mFull.deflRate!==null && mPrev.deflRate!==null) ? mFull.deflRate - mPrev.deflRate : null,
    deflRateFull: mFull.deflRate, deflRatePrev: mPrev.deflRate,
    apiPctDelta: (mFull.apiArea && mPrev.apiArea) ? mFull.apiPct - mPrev.apiPct : null,
    apiPctFull: mFull.apiPct, apiPctPrev: mPrev.apiPct,
    basicPctDelta: mFull.basicPct - mPrev.basicPct,
    basicPctFull: mFull.basicPct, basicPctPrev: mPrev.basicPct,
    avgResDelta: mFull.avgResolution - mPrev.avgResolution,
    avgResFull: mFull.avgResolution, avgResPrev: mPrev.avgResolution,
    newEscalations, newAreas, newSpamCats, newInternalPower, newExternalPower,
    mFull, mPrev
  };
}

// Ranked pool of "what's actually new" signals for the Trending Now card. Each candidate
// only clears the bar if it passed a real threshold (>=3pt swings, >=20% area trend, etc)
// — a quiet day with nothing material renders an honest empty state instead of manufacturing
// a signal out of noise.
function buildTrendingSignals(since){
  if(!since) return [];
  const signals = [];
  const m = since.mFull;

  if(since.newEscalations.length){
    signals.push({p:100, html:'<li><span class="mono">'+since.newEscalations.length+'</span> new same-user Freshdesk escalation'+(since.newEscalations.length===1?'':'s')+' since the last report — '+since.newEscalations.map(e=>e.email.split('@')[0]+' (&ldquo;'+e.ticketSubject+'&rdquo;)').join('; ')+'</li>'});
  }
  if(since.newAreas.length){
    signals.push({p:85, html:'<li>First-ever appearance in the tracked window for <span class="mono">'+since.newAreas.map(a=>a.area).join(', ')+'</span><span class="badge-new">NEW</span></li>'});
  }
  if(m.sharpestMover && Math.abs(m.sharpestMover.trend.pctChange) >= 20){
    const t = m.sharpestMover.trend;
    signals.push({p: 70+Math.min(Math.abs(t.pctChange),30), html:'<li><span class="mono">'+m.sharpestMover.area+'</span> '+(t.pctChange>=0?'grew <span class="mono">+':'cooled <span class="mono">')+t.pctChange+'%</span> in the 2nd half of the window vs the 1st half — the sharpest mover of any tracked area right now, regardless of its overall rank</li>'});
  }
  if(since.deflRateDelta !== null && Math.abs(since.deflRateDelta) >= 3){
    signals.push({p:65, html:'<li>Deflection rate moved <span class="mono">'+(since.deflRateDelta>=0?'+':'')+since.deflRateDelta+'pts</span> since the last report ('+since.deflRatePrev+'% → '+since.deflRateFull+'%)</li>'});
  }
  if(since.newInternalPower.length || since.newExternalPower.length){
    const names = since.newInternalPower.concat(since.newExternalPower).map(u=>u.email.split('@')[0]);
    signals.push({p:60, html:'<li>New face'+(names.length===1?'':'s')+' in the power-user leaderboard: <span class="mono">'+names.join(', ')+'</span><span class="badge-new">NEW</span> — wasn\'t in the top 6 as of the last report</li>'});
  }
  if(since.apiPctDelta !== null && Math.abs(since.apiPctDelta) >= 3){
    signals.push({p:55, html:'<li>API/Integration share moved <span class="mono">'+(since.apiPctDelta>=0?'+':'')+since.apiPctDelta+'pts</span> since the last report ('+since.apiPctPrev+'% → '+since.apiPctFull+'%)</li>'});
  }
  if(since.newSpamCats.length){
    signals.push({p:35, html:'<li>New off-topic pattern detected: <span class="mono">'+since.newSpamCats.join(', ')+'</span><span class="badge-new">NEW</span> — see Data hygiene below</li>'});
  }

  return signals.sort((a,b)=>b.p-a.p).slice(0,4);
}

function renderSinceStrip(since){
  if(!since){
    return '<div class="since-strip"><span class="since-empty">Not enough history yet for a since-last-report comparison — needs at least 2 tracked days.</span></div>';
  }
  const arrow = (v)=> v===null ? '<span class="dim">—</span>' : (v>0 ? '<span class="arrow-up">▲ +'+v+'</span>' : (v<0 ? '<span class="arrow-down">▼ '+v+'</span>' : '<span class="dim">flat</span>'));
  const items = [];
  items.push('<span class="since-item">Deflection '+(since.deflRatePrev!==null?since.deflRatePrev+'%':'—')+' → '+(since.deflRateFull!==null?since.deflRateFull+'%':'—')+' '+arrow(since.deflRateDelta)+'</span>');
  items.push('<span class="since-item">API share '+since.apiPctPrev+'% → '+since.apiPctFull+'% '+arrow(since.apiPctDelta)+'</span>');
  items.push('<span class="since-item">Avg resolution '+since.avgResPrev+'% → '+since.avgResFull+'% '+arrow(since.avgResDelta)+'</span>');
  if(since.newEscalations.length) items.push('<span class="since-item">'+since.newEscalations.length+' new escalation'+(since.newEscalations.length===1?'':'s')+'<span class="badge-new">NEW</span></span>');
  if(since.newAreas.length) items.push('<span class="since-item">'+since.newAreas.length+' new area'+(since.newAreas.length===1?'':'s')+'<span class="badge-new">NEW</span></span>');
  return '<div class="since-strip"><span class="since-label">Since last report ('+fmtDate(since.latestDate)+' added)</span>'+items.join('')+'</div>';
}

          <div class="takeaway-num">05</div>
          <div class="takeaway-body">
            <div class="ttitle">Freshdesk-checked, the bot deflects ${m.deflRate!==null ? m.deflRate+'%' : 'an unmeasured share'} of tickets — and the rare leaks are product bugs, not content gaps</div>
            <ul class="takeaway-bullets">
              <li><span class="mono">${m.deflDeflected}</span> of <span class="mono">${m.deflChecked}</span> checked conversations across <span class="mono">${m.deflDaysTracked.length}</span> tracked days show no matching ticket from that user in the D+2 window</li>
              ${m.deflEscalations.length ? '<li>The <span class="mono">'+m.deflEscalations.length+'</span> confirmed same-user escalations — '+m.deflEscalations.map(e=>e.email.split('@')[0]+' ('+fmtDate(e.date)+', &ldquo;'+e.ticketSubject+'&rdquo;)').join('; ')+' — are all functional/platform issues (integration access, upload/harvest error, Journey-creation bug), not missing documentation</li>' : '<li>No confirmed same-user escalations yet in the tracked window.</li>'}
              <li class="reco">Fix: the content side is already working here — the next lever for deflection is fixing the upload/integration/Journey bugs the bot can't talk its way around</li>
            </ul>
          </div>
        </div>

        <div class="takeaway-card">
          <div class="takeaway-num">06</div>
          <div class="takeaway-body">
            <div class="ttitle">${m.uploadHits.length} list/audience upload-or-harvest failures surfaced only because customers happened to ask the bot</div>
            <ul class="takeaway-bullets">
              <li><span class="mono">${m.uploadExternalCount}</span> from customers, <span class="mono">${m.uploadInternalCount}</span> from Netcore staff — zero internal visibility until it hit the bot</li>
              <li>Spread across <span class="mono">${m.uploadDaysCount}</span> of the ${m.dates.length} tracked days${m.uploadPeak ? ', peaking at '+m.uploadPeak[1]+' on '+fmtDate(m.uploadPeak[0]) : ''} — unrelated accounts, same failure mode, not a one-off</li>
              <li class="reco">Fix: ship a near-real-time upload/processing status indicator so customers aren't the first to notice</li>
            </ul>
          </div>
        </div>

        <div class="takeaway-card">
          <div class="takeaway-num">07</div>
          <div class="takeaway-body">
            <div class="ttitle">Read the daily numbers with two calibration notes before presenting either one on its own</div>
            <ul class="takeaway-bullets">
              <li>Self-reported resolution rate averages <span class="mono">${m.avgResolution}%</span> across ${m.dates.length} days, but <span class="mono">${m.csatArtifactDates.length}</span> of those days are confirmed Featurebase CSAT-workflow-state artifacts (state flips to "handed off" even when the bot fully answered) — not real failures. Don't use the raw average as a KPI until that instrumentation is fixed.</li>
              <li>Volume swings hard by day of week: <span class="mono">${m.weekdayAvg}</span> conversations/day on weekdays vs <span class="mono">${m.weekendAvg}</span> on weekends — held across every weekend in the window, so a quiet Saturday/Sunday is expected, not a broken pipeline.</li>
              <li class="reco">Fix: lean on this 14-day rollup for any leadership-facing number — a single day's snapshot can mislead in either direction</li>
            </ul>
          </div>
        </div>
      </div>
    </details>

    <details class="acc anim" id="sec-h-areas">
      <summary><span><span class="snum">03</span>Busiest sections — where questions land most</span><span class="vm"><span class="vm-more">View more ↓</span><span class="vm-less">View less ↑</span></span></summary>
      <div class="acc-body">
        ${(() => {
          const top3 = m.topAreas.slice(0,3);
          const rest = m.topAreas.slice(3);
          const top3Pct = m.validTotalConv ? Math.round(top3.reduce((s,a)=>s+a.total,0)/m.validTotalConv*100) : 0;
          const sharpBuried = m.sharpestMover && !top3.some(a=>a.area===m.sharpestMover.area) && Math.abs(m.sharpestMover.trend.pctChange) >= 15;
          return `
        <div class="acc-sub">The top ${top3.length} topic${top3.length===1?'':'s'} below account for <span class="mono">${top3Pct}%</span> of all valid questions logged across ${m.dates.length} days${m.suppressedCount ? ' ('+m.suppressedCount+' off-topic/spam item'+(m.suppressedCount===1?'':'s')+' excluded — see Data hygiene below)' : ''}. Each carries one concrete reason it matters — not just a volume count.</div>
        ${sharpBuried ? '<div class="sharp-mover-callout"><span class="icon">⚡</span><div class="body"><span class="mono">'+m.sharpestMover.area+'</span> isn\'t in the top 3 by volume, but it moved <span class="mono">'+(m.sharpestMover.trend.pctChange>=0?'+':'')+m.sharpestMover.trend.pctChange+'%</span> in the 2nd half of the window vs the 1st — the sharpest mover of any tracked area right now. Worth watching even though it\'s buried below.</div></div>' : ''}
        <div class="legend">
          <span><span class="swatch" style="background:var(--internal)"></span>Netcore team</span>
          <span><span class="swatch" style="background:var(--external)"></span>Customer</span>
        </div>
        <div class="lead-areas">
          ${top3.map((a,i)=>{
            const trend = computeAreaTrend(a.area, m);
            const trendHTML = trend
              ? '<span class="lead-area-trend '+(trend.pctChange>=0?'up':'down')+'">'+(trend.pctChange>=0?'▲ +'+trend.pctChange+'%':'▼ '+Math.abs(trend.pctChange)+'%')+' in the 2nd half of the window — '+(trend.pctChange>=0?'growing':'cooling off')+'</span>'
              : '';
            const newBadge = newAreaNames.has(a.area) ? '<span class="badge-new">NEW</span>' : '';
            return `
            <div class="lead-area-card ${a.pattern.cls}" data-drill-area="${a.area}" title="Click to see all ${a.total} questions for ${a.area}">
              <div class="lead-area-rank">${String(i+1).padStart(2,'0')}</div>
              <div class="lead-area-body">
                <div class="lead-area-top">
                  <span class="lead-area-name">${a.area}${newBadge}</span>
                  <span class="lead-area-pct">${a.pct}% of all volume</span>
                </div>
                <div class="lead-area-total">${a.total} conversations${trendHTML}</div>
                ${splitBarHTML(a.internal, a.external)}
                <div class="lead-area-insight">${buildAreaInsight(a, m)}</div>
                <div class="cta-hint">View all ${a.total} questions for ${a.area}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
        ${rest.length ? `
        <div class="other-areas">
          <div class="other-areas-label">Also active — lower volume, still tracked (click any to see its questions)</div>
          <div class="other-areas-list">
            ${rest.map(a=>`<span class="other-area-chip" data-drill-area="${a.area}" title="Click to see all ${a.total} questions for ${a.area}">${a.area}${newAreaNames.has(a.area)?'<span class="badge-new">NEW</span>':''} <span class="mono">${a.total}</span> <span class="dim">(${a.pct}%)</span></span>`).join('')}
          </div>
        </div>` : ''}`;
        })()}
      </div>
    </details>

    <details class="acc anim" id="sec-h-power">
      <summary><span><span class="snum">04</span>Power users — most sessions across the full duration</span><span class="vm"><span class="vm-more">View more ↓</span><span class="vm-less">View less ↑</span></span></summary>
      <div class="acc-body">
        <div class="acc-sub">Two views — who is leaning on the bot the most internally, and which customers are doing the same. The count below is <strong>sessions</strong>, not individual questions — a Featurebase spot-check of these conversations found most sessions carry more than one real question (≈1.6 on average), so actual question volume per person runs higher than the count shown.</div>
        <div class="master-cols">
          <div>
            <div class="master-subtag">Internal — Netcore team</div>
            ${powerColumn(m.powerUsersInternal)}
            ${mWeek ? '<div class="trending-week"><div class="trending-week-label">🔥 Trending this window (last 4 tracked days)</div>'+trendingColumn(mWeek.powerUsersInternal.slice(0,3), allTimeInternalEmails)+'</div>' : ''}
          </div>
          <div>
            <div class="master-subtag">External — Customers</div>
            ${powerColumn(m.powerUsersExternal)}
            ${mWeek ? '<div class="trending-week"><div class="trending-week-label">🔥 Trending this window (last 4 tracked days)</div>'+trendingColumn(mWeek.powerUsersExternal.slice(0,3), allTimeExternalEmails)+'</div>' : ''}
          </div>
        </div>
      </div>
    </details>

    <details class="acc anim" id="sec-h-hygiene">
      <summary><span><span class="snum">05</span>Data hygiene — excluded from analysis</span><span class="vm"><span class="vm-more">View more ↓</span><span class="vm-less">View less ↑</span></span></summary>
      <div class="acc-body">
        <div class="acc-sub">${m.suppressedCount} message${m.suppressedCount===1?'':'s'} auto-detected as off-topic / bot-style traffic — loan, credit-card, lottery, job, KYC and similar spam patterns with no connection to Netcore CE — and excluded from every aggregate above (Busiest sections, Power users, both drilldowns). Nothing is hidden: every excluded item is listed below with its reason, so this stays auditable rather than a silent filter. Scope note — the "Conversations, all-time" counter at the top of this page still includes these, since it's read straight from each day's own pipeline total rather than recomputed here.</div>
        ${renderSuppressedFeed(m.suppressed)}
      </div>
    </details>

    <div class="footer-note">CE Docbot daily pulse · Featurebase, Netcore CE workspace</div>
  `;
}
function classifiedExamplesHTML(items){
  return items.length
    ? items.map(q=>'<div class="topask-q"><span class="t">'+(q.date?fmtDate(q.date)+' · ':'')+q.area+'</span>'+q.q+'</div>').join('')
    : '<div class="deflect-empty">No example questions captured for this type.</div>';
}

function wireQtypeDual(panelId, techBtnId, genBtnId, questions){
  const panel = document.getElementById(panelId);
  const techBtn = document.getElementById(techBtnId);
  const genBtn = document.getElementById(genBtnId);
  if(!panel || !techBtn || !genBtn) return;
  let openType = null;
  function show(type){
    const items = questions.filter(q=>q.type===type).slice(0,8);
    panel.innerHTML = '<div class="qtype-panel-tag">Auto-classified from question text — illustrative examples, not an exact reconciliation of the count above.</div>' + classifiedExamplesHTML(items);
  }
  function toggle(type){
    if(openType===type){ openType=null; panel.classList.remove('open'); techBtn.classList.remove('active'); genBtn.classList.remove('active'); return; }
    openType=type; show(type); panel.classList.add('open');
    techBtn.classList.toggle('active', type==='technical');
    genBtn.classList.toggle('active', type==='generic');
  }
  techBtn.addEventListener('click', ()=>toggle('technical'));
  genBtn.addEventListener('click', ()=>toggle('generic'));
}

function wireQtypeStat(panelId, statId, questions){
  const panel = document.getElementById(panelId);
  const stat = document.getElementById(statId);
  if(!panel || !stat) return;
  let open = false;
  stat.addEventListener('click', ()=>{
    open = !open;
    if(!open){ panel.classList.remove('open'); return; }
    const tech = questions.filter(q=>q.type==='technical').slice(0,6);
    const gen = questions.filter(q=>q.type==='generic').slice(0,6);
    panel.innerHTML = '<div class="qtype-panel-tag">Auto-classified from question text — illustrative examples, not an exact reconciliation of the totals above.</div>'
      + '<div class="qtype-panel-cols"><div><div class="qtype-panel-sub tech">Technical</div>'+classifiedExamplesHTML(tech)+'</div><div><div class="qtype-panel-sub gen">Generic</div>'+classifiedExamplesHTML(gen)+'</div></div>';
    panel.classList.add('open');
  });
}

// Shared "question feed" drilldown — powers both the area click-through (PM wants to see
// the actual questions behind a topic) and the power-user click-through (gauge what level/type
// of question a repeat asker is sending, starting from their first one).
function questionTypeBadges(q){
  const type = classifyQueryType(q.q);
  const sideCls = q.side==='internal' ? 'internal' : 'external';
  const sideLabel = q.side==='internal' ? 'Netcore' : 'Customer';
  return '<span class="modal-q-badge '+sideCls+'">'+sideLabel+'</span><span class="modal-q-badge '+type+'">'+(type==='technical'?'Technical':'Generic')+'</span>';
}

function renderQuestionFeed(items, opts){
  opts = opts || {};
  if(!items.length) return '<div class="modal-empty">No questions captured for this view yet.</div>';
  return items.map((q,i)=>{
    const firstTag = (opts.flagFirst && i===0) ? '<span class="modal-q-first">First question asked</span>' : '';
    const areaTag = (opts.showArea && q.area) ? ' · '+q.area : '';
    const panelTag = (q.panel && q.panel!=='NA') ? '<span class="panel-tag">'+q.panel+'</span>' : '';
    return '<div class="modal-q"><div class="modal-q-meta">'+fmtDate(q.date)+areaTag+' · <span class="mono">'+q.email+'</span>'+panelTag+' '+questionTypeBadges(q)+' '+firstTag+'</div><div class="modal-q-text">'+q.q+'</div></div>';
  }).join('');
}

// Renders the full audit trail of messages auto-detected as off-topic/spam (loan, credit,
// lottery, job-spam etc.) and excluded from every other aggregate in this dashboard. Always
// shown in full, never collapsed behind a count, so the exclusion stays checkable by a human.
function renderSuppressedFeed(items){
  if(!items.length) return '<div class="modal-empty">Nothing suppressed yet — every question in the archive currently classifies as on-topic.</div>';
  return items.slice().sort((a,b)=> b.date.localeCompare(a.date)).map(q=>{
    const sideCls = q.side==='internal' ? 'internal' : 'external';
    const sideLabel = q.side==='internal' ? 'Netcore' : 'Customer';
    return '<div class="modal-q"><div class="modal-q-meta">'+fmtDate(q.date)+' · '+q.area+' · <span class="mono">'+q.email+'</span> <span class="modal-q-badge '+sideCls+'">'+sideLabel+'</span> <span class="modal-q-badge spam">'+q.reason+'</span></div><div class="modal-q-text">'+q.q+'</div></div>';
  }).join('');
}

function openDrillModal(title, meta, bodyHTML){
  document.getElementById('drillModalTitle').textContent = title;
  document.getElementById('drillModalMeta').innerHTML = meta;
  document.getElementById('drillModalBody').innerHTML = bodyHTML;
  document.getElementById('drillModal').classList.add('open');
}
function closeDrillModal(){
  document.getElementById('drillModal').classList.remove('open');
}

function openAreaDrilldown(area){
  const m = computeMasterSummary(ARCHIVE);
  const items = m.allQuestions.filter(q=>q.area===area).slice().sort((x,y)=> y.date.localeCompare(x.date));
  const a = m.topAreas.find(x=>x.area===area) || {total:items.length, pct:0, internal:0, external:0};
  const meta = '<span class="mono">'+a.total+'</span> question'+(a.total===1?'':'s')+' · '+a.pct+'% of all-time volume · '+a.internal+' Netcore : '+a.external+' Customer — newest first';
  openDrillModal(area, meta, renderQuestionFeed(items, {showArea:false}));
}

function openUserDrilldown(email){
  const m = computeMasterSummary(ARCHIVE);
  const items = m.allQuestions.filter(q=>q.email===email).slice().sort((x,y)=> x.date.localeCompare(y.date));
  const u = m.powerUsersInternal.concat(m.powerUsersExternal).find(x=>x.email===email);
  const meta = '<span class="mono">'+items.length+'</span> question'+(items.length===1?'':'s')+' across '+(u?u.dayCount:items.length)+' day'+((u&&u.dayCount===1)?'':'s')+' · mostly '+(u?u.topArea:'—')+' — oldest first, so you can see what they started with';
  openDrillModal(email, meta, renderQuestionFeed(items, {showArea:true, flagFirst:true}));
}

function wireDrillModal(){
  const overlay = document.getElementById('drillModal');
  const closeBtn = document.getElementById('drillModalClose');
  if(!overlay || !closeBtn) return;
  closeBtn.addEventListener('click', closeDrillModal);
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeDrillModal(); });
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeDrillModal(); });
  document.getElementById('main').addEventListener('click', (e)=>{
    const areaEl = e.target.closest('[data-drill-area]');
    if(areaEl){ openAreaDrilldown(areaEl.dataset.drillArea); return; }
    const userEl = e.target.closest('[data-drill-email]');
    if(userEl){ openUserDrilldown(userEl.dataset.drillEmail); return; }
  });
}

function wireAccordionExclusivity(container){
  const accs = Array.from(container.querySelectorAll('details.acc'));
  accs.forEach(d=>{
    d.addEventListener('toggle', ()=>{
      if(d.open){
        accs.forEach(other=>{ if(other!==d && other.open) other.open = false; });
      }
    });
  });
}

function render(){
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  sidebar.innerHTML = renderSidebar();
  main.innerHTML = activeTab==='daily' ? renderDailyMain(ARCHIVE[activeDate]) : renderHistoricalMain();
  wireAccordionExclusivity(main);

  sidebar.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ activeTab = btn.dataset.tab; render(); });
  });
  const sel = document.getElementById('dateSelect');
  if(sel){
    sel.addEventListener('change', (e)=>{ activeDate = e.target.value; render(); });
  }

  if(activeTab==='daily'){
    const data = ARCHIVE[activeDate];
    const dailyQuestions = (data.areas||[]).flatMap(a=>[
      ...(a.internalQ||[]).map(x=>({area:a.area, q:x.q})),
      ...(a.externalQ||[]).map(x=>({area:a.area, q:x.q}))
    ]).map(x=>Object.assign({}, x, {type: classifyQueryType(x.q)}));
    wireQtypeDual('qtypePanel','qtypeTechBtn','qtypeGenBtn', dailyQuestions);
  } else {
    const m = computeMasterSummary(ARCHIVE);
    const histQuestions = m.allQuestions.map(x=>Object.assign({}, x, {type: classifyQueryType(x.q)}));
    wireQtypeStat('qtypePanelH','statQtypeH', histQuestions);
  }
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme', theme);
  const lightBtn = document.getElementById('themeLightBtn');
  const darkBtn = document.getElementById('themeDarkBtn');
  if(lightBtn && darkBtn){
    lightBtn.classList.toggle('active', theme==='light');
    darkBtn.classList.toggle('active', theme==='dark');
  }
}
function bootTopbar(){
  const lightBtn = document.getElementById('themeLightBtn');
  const darkBtn = document.getElementById('themeDarkBtn');
  if(lightBtn) lightBtn.addEventListener('click', ()=>{ theme='light'; applyTheme(); });
  if(darkBtn) darkBtn.addEventListener('click', ()=>{ theme='dark'; applyTheme(); });
  applyTheme();
}

function boot(){
  bootTopbar();
  wireDrillModal();
  if(!DATES.length){
    document.getElementById('main').innerHTML = '<div class="empty"><h2>No dispatch yet</h2><p>This view refreshes once the daily pull runs.</p></div>';
    return;
  }
  activeDate = DATES[0];
  render();
}
boot();
</script>
</body>
