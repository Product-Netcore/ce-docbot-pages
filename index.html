function fmtDate(d){
  try{ return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}); }
  catch(e){ return d; }
}
const OWNER_LABEL = {content:"Content", product:"Product", design:"Design", calibration:"Read this first", security:"Security"};

// Aggregates across every date currently in ARCHIVE — recomputes automatically
// as more days get appended, so this section needs no manual upkeep.
function computeMasterSummary(archive){
  const dates = Object.keys(archive).sort();
  const askerMap = {};
  const areaMap = {};
  let totalConv = 0, totalResSum = 0, totalInternal = 0, totalExternal = 0;

  dates.forEach(d=>{
    const day = archive[d];
    totalConv += day.totalConversations;
    totalResSum += day.resolutionRate;
    totalInternal += day.internalTotal;
    totalExternal += day.externalTotal;

    // Count every individual question per person (not just the curated
    // "top askers" highlight list) so power users reflect true volume across
    // the full tracked duration, including people who ask once per day on
    // several different days.
    (day.areas||[]).forEach(a=>{
      const key = a.area.replace(' (greeting only)','');
      if(!areaMap[key]) areaMap[key] = {internal:0, external:0};
      areaMap[key].internal += a.internal;
      areaMap[key].external += a.external;

      const tallyAsker = (x)=>{
        if(!askerMap[x.email]) askerMap[x.email] = {count:0, days:new Set(), areas:{}};
        askerMap[x.email].count++;
        askerMap[x.email].days.add(d);
        askerMap[x.email].areas[key] = (askerMap[x.email].areas[key]||0)+1;
      };
      (a.internalQ||[]).forEach(tallyAsker);
      (a.externalQ||[]).forEach(tallyAsker);
    });
  });

  const powerUsers = Object.entries(askerMap)
    .map(([email,v])=>({
      email, count:v.count, dayCount:v.days.size,
      topArea: Object.entries(v.areas).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—'
    }))
    .sort((a,b)=>b.count-a.count || b.dayCount-a.dayCount)
    .slice(0,6);

  const topAreas = Object.entries(areaMap)
    .map(([area,v])=>({area, total:v.internal+v.external, internal:v.internal, external:v.external}))
    .filter(a=>a.total>0)
    .sort((a,b)=>b.total-a.total);

  const maxAreaTotal = Math.max(...topAreas.map(a=>a.total), 1);
  const avgResolution = dates.length ? Math.round(totalResSum/dates.length) : 0;
  const recurringUsers = powerUsers.filter(u=>u.dayCount>1);

  return { dates, totalConv, avgResolution, totalInternal, totalExternal, powerUsers, topAreas, maxAreaTotal, recurringUsers };
}

        </div>
      </div>
      ${m.recurringUsers.length ? `<div class="master-note"><span class="master-note-label">↻ Worth a direct, proactive check-in — asked on more than one separate day</span><div class="recurring-chips">${m.recurringUsers.map(u=>`<span class="recurring-chip">${u.email}</span>`).join('')}</div></div>` : ''}
    </div>

    <div class="footer-note">CE Docbot daily pulse · Featurebase, Netcore CE workspace</div>
  `;

  const sel = document.getElementById('dateSelect');
  if (sel) {
    sel.addEventListener('change', (e)=>{
      const picked = e.target.value;
      if (ARCHIVE[picked]) render(ARCHIVE[picked], availableDates);
    });
  }
}

function boot(){
  const latestDate = DATES[0];
  render(ARCHIVE[latestDate], DATES);
}
boot();
</script>
</body>
</html>
