// Renders the "Ticket Deflection" card — cross-checks yesterday's docbot queries
// against Freshdesk to see whether the bot actually saved a helpdesk ticket.
// td is data.ticketDeflection: either the object built by Step 5 of the daily
// pipeline, or null/undefined for days before this check existed (2026-06-24+ only).
function renderDeflection(td){
  if(!td){
    return '<div class="deflect anim" style="animation-delay:.11s"><div class="deflect-na">Not tracked for this date — Freshdesk cross-check wasn\'t available (or didn\'t exist yet) when this day was processed.</div></div>';
  }
  var escalations = td.sameUserEscalations || [];
  var esc = escalations.map(function(e){
    return '<div class="deflect-item"><span class="who">'+e.email+'</span> asked &ldquo;'+e.docbotQuery+'&rdquo; ('+e.area+') — then opened <span class="tix">#'+e.ticketId+' &ldquo;'+e.ticketSubject+'&rdquo;</span> on '+e.ticketCreatedAt+'.</div>';
  }).join('');
  var escBlock = escalations.length
    ? '<div class="deflect-subtag">Same user, ticket anyway — bot likely didn\'t fully resolve it</div>' + esc
    : '<div class="deflect-empty">No same-user escalations found in the matching window — nobody who asked the bot a question also opened a ticket.</div>';
  var patternBlock = '';
  if(td.patternRisk && td.patternRisk.length){
    var pat = td.patternRisk.map(function(p){
      var examples = (p.exampleTicketSubjects && p.exampleTicketSubjects.length)
        ? ' — e.g. &ldquo;'+p.exampleTicketSubjects.join('&rdquo;, &ldquo;')+'&rdquo;'
        : '';
      return '<div class="deflect-pattern"><span class="area">'+p.area+'</span>: '+p.docbotCount+' docbot conversation'+(p.docbotCount===1?'':'s')+' vs '+p.ticketCount+' helpdesk ticket'+(p.ticketCount===1?'':'s')+' in the same window'+examples+'. '+(p.note||'')+'</div>';
    }).join('');
    patternBlock = '<div class="deflect-subtag">Pattern risk — other users hit the same topic via a ticket</div>' + pat;
  }
  return '<div class="deflect anim" style="animation-delay:.11s">'
    + '<h2>Did the bot actually save anyone a ticket?</h2>'
    + '<div class="sub">Checked against Freshdesk for tickets raised in the matching window ('+td.windowNote+'). <span style="color:var(--internal)">Deflected</span> = no matching ticket from that user. <span style="color:var(--external)">Escalated</span> = same user opened a ticket anyway.</div>'
    + '<div class="deflect-grid">'
      + '<div class="deflect-stat good"><div class="v">'+td.deflectionRate+'%</div><div class="l">Deflected — '+td.deflectedCount+' of '+td.totalConversations+'</div></div>'
      + '<div class="deflect-stat bad"><div class="v">'+escalations.length+'</div><div class="l">Escalated by same user</div></div>'
    + '</div>'
    + escBlock
    + patternBlock
    + '<div class="deflect-caveat">'+td.caveat+'</div>'
  + '</div>';
}

// Aggregates across every date currently in ARCHIVE — recomputes automatically
// as more days get appended, so this section needs no manual upkeep.
function computeMasterSummary(archive){
  const dates = Object.keys(archive).sort();
  const askerMap = {};
  const areaMap = {};
  let totalConv = 0, totalResSum = 0, totalInternal = 0, totalExternal = 0;

  dates.forEach(d=>{
    const day = archive[d];
    totalConv += day.totalConversations;
    totalResSum += day.resolutionRate;
    totalInternal += day.internalTotal;
    totalExternal += day.externalTotal;

    // Count every individual question per person (not just the curated
    // "top askers" highlight list) so power users reflect true volume across
    // the full tracked duration, including people who ask once per day on
    // several different days.
    (day.areas||[]).forEach(a=>{
      const key = a.area.replace(' (greeting only)','');
      if(!areaMap[key]) areaMap[key] = {internal:0, external:0};
      areaMap[key].internal += a.internal;
      areaMap[key].external += a.external;

      const tallyAsker = (x)=>{
        if(!askerMap[x.email]) askerMap[x.email] = {count:0, days:new Set(), areas:{}};
        askerMap[x.email].count++;
        askerMap[x.email].days.add(d);
        askerMap[x.email].areas[key] = (askerMap[x.email].areas[key]||0)+1;
      };
      (a.internalQ||[]).forEach(tallyAsker);
      (a.externalQ||[]).forEach(tallyAsker);
    });
  });

  const powerUsers = Object.entries(askerMap)
    .map(([email,v])=>({
      email, count:v.count, dayCount:v.days.size,
      topArea: Object.entries(v.areas).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—'
    }))
    .sort((a,b)=>b.count-a.count || b.dayCount-a.dayCount)
    .slice(0,6);

  const topAreas = Object.entries(areaMap)
    .map(([area,v])=>({area, total:v.internal+v.external, internal:v.internal, external:v.external}))
    .filter(a=>a.total>0)
    .sort((a,b)=>b.total-a.total);

  const maxAreaTotal = Math.max(...topAreas.map(a=>a.total), 1);
  const avgResolution = dates.length ? Math.round(totalResSum/dates.length) : 0;
  const recurringUsers = powerUsers.filter(u=>u.dayCount>1);

  return { dates, totalConv, avgResolution, totalInternal, totalExternal, powerUsers, topAreas, maxAreaTotal, recurringUsers };
}

            <div class="area-row">
              <span class="area-name">${a.area}</span>
              <div class="area-bar-track"><div class="area-bar-fill" style="width:${a.total/m.maxAreaTotal*100}%"></div></div>
              <span class="area-count">${a.total}</span>
            </div>
          `).join('')}
        </div>
      </div>
      ${m.recurringUsers.length ? `<div class="master-note"><span class="master-note-label">↻ Worth a direct, proactive check-in — asked on more than one separate day</span><div class="recurring-chips">${m.recurringUsers.map(u=>`<span class="recurring-chip">${u.email}</span>`).join('')}</div></div>` : ''}
    </div>

    <div class="footer-note">CE Docbot daily pulse · Featurebase, Netcore CE workspace</div>
  `;

  const sel = document.getElementById('dateSelect');
  if (sel) {
    sel.addEventListener('change', (e)=>{
      const picked = e.target.value;
      if (ARCHIVE[picked]) render(ARCHIVE[picked], availableDates);
    });
  }
}

function boot(){
  const latestDate = DATES[0];
  render(ARCHIVE[latestDate], DATES);
}
boot();
</script>
</body>
</html>
